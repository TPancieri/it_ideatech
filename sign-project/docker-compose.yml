version: "3.9"

services :
  laravelapp:
    container name: laravelapp
    image: thiago/laravelapp:l.0.0
    build: .
    ports : "8000:8000"
    env file: .env
    depend s _on : db
  db:
    container name: db
    image: postgres:18
    ports: "5433:5433"
    environment:
    POSTGRES USER: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_DB: postgres
    volumes : pgdata:/var/lib/postgresql/data

  volumes :
    pgdata: {}